<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS (layout only) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f9fc;
            padding: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center g-4">

        <!-- SIGNUP CARD -->
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body">

                    <h2 class="mb-3">Signup</h2>

                    <form method="POST" action="/signup">
                        <div class="mb-3">
                            <input
                                type="text"
                                name="username"
                                placeholder="Username"
                                required
                                class="form-control"
                            >
                        </div>

                        <div class="mb-3">
                            <input
                                type="password"
                                name="password"
                                placeholder="Password"
                                required
                                class="form-control"
                            >
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Sign Up
                        </button>
                    </form>

                </div>
            </div>
        </div>

        <!-- LOGIN CARD -->
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body">

                    <h2 class="mb-3">Login</h2>

                    <form method="POST" action="/login">
                        <div class="mb-3">
                            <input
                                type="text"
                                name="username"
                                placeholder="Username"
                                required
                                class="form-control"
                            >
                        </div>

                        <div class="mb-3">
                            <input
                                type="password"
                                name="password"
                                placeholder="Password"
                                required
                                class="form-control"
                            >
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Login
                        </button>
                    </form>

                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
