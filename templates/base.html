<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}XpenseFlow{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root{
            /* LIGHT THEME DEFAULTS */
            --bg: radial-gradient(circle at top left,#e5e7eb 0,#f9fafb 45%,#e5e7eb 100%);
            --surface: #ffffff;
            --text: #0f172a;
            --muted:#6b7280;
            --accent:#4f46e5;
            --border:rgba(15,23,42,0.12);
        }

        body{
            margin:0;
            min-height:100vh;
            font-family: system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
            background:var(--bg);
            color:var(--text);
            -webkit-font-smoothing:antialiased;
        }

        /* DARK THEME OVERRIDES WHEN .dark IS ON BODY */
        body.dark{
            --bg: radial-gradient(circle at top left,#020617 0,#020617 45%,#020617 100%);
            --surface:#020617;
            --text:#e5e7eb;
            --muted:#9ca3af;
            --accent:#6366f1;
            --border:#334155;
            background:var(--bg);
            color:var(--text);
        }

        .app-shell{
            padding:12px 18px;
        }
        .theme-toggle{
            cursor:pointer;
        }

        /* NAV BUTTONS */
        .nav-btn{
            border-radius:999px;
            font-size:0.85rem;
            padding:4px 12px;
        }
        body:not(.dark) .nav-btn{
            color:var(--text);
            border-color:var(--border);
            background-color:rgba(255,255,255,0.9);
        }
        body.dark .nav-btn{
            color:#e5e7eb;
            border-color:#4b5563;
            background-color:transparent;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="d-flex justify-content-between align-items-center px-3 py-2">
    <div class="fw-semibold">💰 XpenseFlow</div>
    <div class="d-flex gap-2 align-items-center">
        <button id="themeToggle" class="btn btn-sm btn-outline-secondary theme-toggle">
            <span id="themeLabel">Light</span> mode
        </button>
        {% if show_navbar %}
        <!-- Summary now opens dashboard with popup -->
        <a href="/dashboard?summary=1" class="btn btn-sm nav-btn">Summary</a>
        <a href="/dashboard" class="btn btn-sm nav-btn">Dashboard</a>
        <a href="/analytics" class="btn btn-sm nav-btn">Analytics</a>
        <a href="/logout"    class="btn btn-sm btn-danger">Logout</a>
        {% endif %}
    </div>
</nav>

<div class="app-shell">
    {% block content %}{% endblock %}
</div>

<script>
  // INITIAL THEME: always default to LIGHT unless user explicitly chose dark
  (function(){
      const body  = document.body;
      const label = document.getElementById("themeLabel");

      let saved = localStorage.getItem("theme");
      if (saved !== "light" && saved !== "dark") {
          saved = "light";
          localStorage.setItem("theme", "light");
      }

      if (saved === "dark") {
          body.classList.add("dark");
          if (label) label.textContent = "Dark";
      } else {
          body.classList.remove("dark");
          if (label) label.textContent = "Light";
      }
  })();

  // TOGGLE BUTTON
  document.getElementById("themeToggle").addEventListener("click", function(){
      const body  = document.body;
      const label = document.getElementById("themeLabel");
      const isDark = body.classList.toggle("dark");
      localStorage.setItem("theme", isDark ? "dark" : "light");
      if (label) label.textContent = isDark ? "Dark" : "Light";
  });
</script>

</body>
</html>
